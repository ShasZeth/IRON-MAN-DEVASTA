<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>IRON MAN DEVASTA</title>

<style>
body{
    font-family:Arial, sans-serif;
    margin:20px;
    color:white;

    background:
        linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.84)),
        url("/img/iron-man-devasta-bg.png");

    background-size:cover;
    background-position:center top;
    background-attachment:fixed;
}

.header{
    text-align:center;
    margin-top:260px;
    margin-bottom:20px;
}

.top{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

button{
    padding:10px 15px;
    cursor:pointer;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.logout-btn{
    background:#dc3545;
    color:white;
}

.admin-btn{
    background:#6f42c1;
    color:white;
}

.refresh-btn{
    background:#2196f3;
    color:white;
}

.unlock-btn{
    background:#ff9800;
    color:white;
}

.stats{
    max-width:700px;
    margin:20px auto 30px auto;
    background:rgba(20,20,20,.75);
    border:2px solid #b8860b;
    border-radius:12px;
    padding:8px 15px;
    box-shadow:0 0 15px rgba(0,0,0,.8);
}

.stats-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    font-weight:bold;
}

.stats-left{
    color:#90ee90;
}

.stats-right{
    color:#ffcc66;
}

.progress{
    width:100%;
    height:14px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin-top:6px;
    border:1px solid #b8860b;
}

#progressBar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, #8b0000, #ff0000, #ffcc00);
    transition:.3s;
}

#progressText{
    text-align:center;
    margin:6px 0 0 0;
    font-size:14px;
}

#adminPanel{
    display:none;
    max-width:800px;
    margin:20px auto;
    border:2px solid #b8860b;
    padding:15px;
    background:rgba(20,20,20,.9);
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.8);
}

.admin-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.admin-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #555;
    padding:10px 0;
}

.admin-row:last-child{
    border-bottom:none;
}

#board{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:10px;
    margin-top:35px;
}

.tile{
    min-height:85px;
    border:2px solid #b8860b;
    cursor:pointer;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    font-weight:bold;
    background:linear-gradient(145deg, #0b5f25, #168a3a);
    color:#fff3c4;

    transition:.2s;
    border-radius:10px;
    box-shadow:0 0 12px rgba(0,0,0,.8);
    text-shadow:1px 1px 2px black;
}

.tile:hover{
    transform:scale(1.06);
    box-shadow:0 0 18px #ffd700;
}

.taken{
    background:linear-gradient(145deg, #7a0c0c, #d01818);
    border-color:#ffcc00;
}

@media(max-width:800px){
    .header{
        margin-top:100px;
    }

    #board{
        grid-template-columns:repeat(5,1fr);
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="top">
        <button class="logout-btn" onclick="logout()">Wyloguj</button>
        <button class="admin-btn" onclick="toggleAdminPanel()">Panel admina</button>
    </div>
</div>

<div class="stats">

    <div class="stats-row">
        <span id="freeCount" class="stats-left">
            Wolne: 0
        </span>

        <span id="takenCount" class="stats-right">
            Zajęte: 0
        </span>
    </div>

    <div class="progress">
        <div id="progressBar"></div>
    </div>

    <p id="progressText">Zapełnienie: 0%</p>

</div>

<div id="adminPanel">
    <div class="admin-header">
        <h2>Panel administratora</h2>
        <button class="refresh-btn" onclick="loadAdminTiles()">Odśwież</button>
    </div>

    <div id="adminTiles"></div>
</div>

<div id="board"></div>

<script>
function logout(){
    localStorage.removeItem("token");
    window.location.href = "/";
}

async function toggleAdminPanel(){
    const panel = document.getElementById("adminPanel");

    if(panel.style.display === "none" || panel.style.display === ""){
        panel.style.display = "block";
        await loadAdminTiles();
    }else{
        panel.style.display = "none";
    }
}

async function loadAdminTiles(){
    const token = localStorage.getItem("token");

    const response = await fetch("/api/tiles/taken/list", {
        headers:{
            Authorization:`Bearer ${token}`
        }
    });

    const data = await response.json();

    const container = document.getElementById("adminTiles");
    container.innerHTML = "";

    if(!Array.isArray(data)){
        container.innerHTML = `<p>${data.message || "Brak dostępu"}</p>`;
        return;
    }

    if(data.length === 0){
        container.innerHTML = "<p>Brak zajętych kafelków.</p>";
        return;
    }

    data.forEach(tile => {
        const row = document.createElement("div");
        row.className = "admin-row";

        row.innerHTML = `
            <span><strong>Kafelek #${tile.id}</strong> — ${tile.nickname}</span>
            <button class="unlock-btn" onclick="unlockTile(${tile.id})">
                Odblokuj
            </button>
        `;

        container.appendChild(row);
    });
}

async function unlockTile(id){
    const confirmUnlock = confirm(
        `Czy na pewno chcesz odblokować kafelek #${id}?`
    );

    if(!confirmUnlock){
        return;
    }

    const token = localStorage.getItem("token");

    const response = await fetch(`/api/tiles/unlock/${id}`, {
        method:"POST",
        headers:{
            Authorization:`Bearer ${token}`
        }
    });

    const data = await response.json();

    alert(data.message);

    await loadTiles();
    await loadAdminTiles();
}

function updateStats(tiles){
    const total = tiles.length;
    const taken = tiles.filter(tile => tile.taken).length;
    const free = total - taken;

    const percent =
        total === 0 ? 0 : Math.round((taken / total) * 100);

    document.getElementById("freeCount").innerText =
        `Wolne: ${free}`;

    document.getElementById("takenCount").innerText =
        `Zajęte: ${taken}`;

    document.getElementById("progressBar").style.width =
        `${percent}%`;

    document.getElementById("progressText").innerText =
        `Zapełnienie: ${percent}%`;
}

async function loadTiles(){
    const response = await fetch("/api/tiles");
    const tiles = await response.json();

    updateStats(tiles);

    const board = document.getElementById("board");
    board.innerHTML = "";

    tiles.forEach(tile => {
        const div = document.createElement("div");
        div.className = "tile";

        if(tile.taken){
            div.classList.add("taken");
            div.innerHTML = `
                <div>#${tile.id}</div>
                <small>${tile.nickname || "Zajęte"}</small>
            `;
        }else{
            div.innerHTML = `
                <div>#${tile.id}</div>
                <small>Wolny</small>
            `;
        }

        div.onclick = async () => {
            const token = localStorage.getItem("token");

            if(!token){
                alert("Najpierw się zaloguj");
                window.location.href = "/";
                return;
            }

            const response = await fetch(`/api/tiles/${tile.id}`, {
                method:"POST",
                headers:{
                    Authorization:`Bearer ${token}`
                }
            });

            const data = await response.json();

            alert(data.message);

            await loadTiles();

            if(document.getElementById("adminPanel").style.display === "block"){
                await loadAdminTiles();
            }
        };

        board.appendChild(div);
    });
}

loadTiles();
</script>

</body>
</html>
