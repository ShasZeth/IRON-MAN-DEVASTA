<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tablica</title>

<style>
body{
    font-family:Arial;
    margin:20px;
}

.top{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:15px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

#adminPanel{
    display:none;
    border:2px solid #333;
    padding:15px;
    margin-bottom:20px;
    background:#f4f4f4;
}

.admin-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ccc;
    padding:8px 0;
}

#board{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:10px;
    margin-top:20px;
}

.tile{
    min-height:80px;
    border:1px solid black;
    cursor:pointer;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    font-weight:bold;
    background:green;
    color:white;
    transition:.2s;
}

.tile:hover{
    transform:scale(1.05);
}

.taken{
    background:red;
}
</style>
</head>

<body>

<h1>IRON MAN DEVASTA</h1>

<div class="top">
    <button onclick="logout()">Wyloguj</button>
    <button onclick="toggleAdminPanel()">Panel admina</button>
</div>

<div id="adminPanel">
    <h2>Panel administratora</h2>
    <div id="adminTiles"></div>
</div>

<div id="board"></div>

<script>
function logout(){
    localStorage.removeItem("token");
    window.location.href = "/";
}

async function toggleAdminPanel(){
    const panel = document.getElementById("adminPanel");

    if(panel.style.display === "none" || panel.style.display === ""){
        panel.style.display = "block";
        await loadAdminTiles();
    }else{
        panel.style.display = "none";
    }
}

async function loadAdminTiles(){
    const token = localStorage.getItem("token");

    const response = await fetch("/api/tiles/taken/list", {
        headers:{
            Authorization:`Bearer ${token}`
        }
    });

    const data = await response.json();

    const container = document.getElementById("adminTiles");
    container.innerHTML = "";

    if(!Array.isArray(data)){
        container.innerHTML = `<p>${data.message || "Brak dostępu"}</p>`;
        return;
    }

    if(data.length === 0){
        container.innerHTML = "<p>Brak zajętych kafelków.</p>";
        return;
    }

    data.forEach(tile => {
        const row = document.createElement("div");
        row.className = "admin-row";

        row.innerHTML = `
            <span>Kafelek #${tile.id} — ${tile.nickname}</span>
            <button onclick="unlockTile(${tile.id})">Odblokuj</button>
        `;

        container.appendChild(row);
    });
}

async function unlockTile(id){
    const token = localStorage.getItem("token");

    const response = await fetch(`/api/tiles/unlock/${id}`, {
        method:"POST",
        headers:{
            Authorization:`Bearer ${token}`
        }
    });

    const data = await response.json();

    alert(data.message);

    await loadTiles();
    await loadAdminTiles();
}

async function loadTiles(){
    const response = await fetch("/api/tiles");
    const tiles = await response.json();

    const board = document.getElementById("board");
    board.innerHTML = "";

    tiles.forEach(tile => {
        const div = document.createElement("div");
        div.className = "tile";

        if(tile.taken){
            div.classList.add("taken");
            div.innerHTML = `
                <div>#${tile.id}</div>
                <small>${tile.nickname || "Zajęte"}</small>
            `;
        }else{
            div.innerHTML = `
                <div>#${tile.id}</div>
                <small>Wolny</small>
            `;
        }

        div.onclick = async () => {
            const token = localStorage.getItem("token");

            if(!token){
                alert("Najpierw się zaloguj");
                window.location.href = "/";
                return;
            }

            const response = await fetch(`/api/tiles/${tile.id}`, {
                method:"POST",
                headers:{
                    Authorization:`Bearer ${token}`
                }
            });

            const data = await response.json();

            alert(data.message);

            await loadTiles();

            if(document.getElementById("adminPanel").style.display === "block"){
                await loadAdminTiles();
            }
        };

        board.appendChild(div);
    });
}

loadTiles();
</script>

</body>
</html>
