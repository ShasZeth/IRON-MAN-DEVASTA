<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tablica</title>

<style>
body{
    font-family: Arial;
}

#board{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:10px;
    margin-top:20px;
}

.tile{
    min-height:80px;
    border:1px solid black;
    cursor:pointer;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    font-weight:bold;

    background:green;
    color:white;

    transition:.2s;
}

.tile:hover{
    transform:scale(1.05);
}

.taken{
    background:red;
}

button{
    padding:10px 15px;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>IRON MAN DEVASTA</h1>

<button onclick="logout()">
    Wyloguj
</button>

<a href="/admin.html">
    <button>
        Panel admina
    </button>
</a>

<div id="board"></div>

<script>
function logout(){
    localStorage.removeItem("token");
    window.location.href = "/";
}

async function loadTiles(){

    const response = await fetch("/api/tiles");
    const tiles = await response.json();

    const board = document.getElementById("board");

    board.innerHTML = "";

    tiles.forEach(tile => {

        const div = document.createElement("div");

        div.className = "tile";

        if(tile.taken){
            div.classList.add("taken");
        }

        if(tile.taken){

            div.innerHTML = `
                <div>#${tile.id}</div>
                <small>${tile.nickname || "Zajęte"}</small>
            `;

        }else{

            div.innerHTML = `
                <div>#${tile.id}</div>
                <small>Wolny</small>
            `;

        }

        div.onclick = async () => {

            const token = localStorage.getItem("token");

            if (!token) {
                alert("Najpierw się zaloguj");
                window.location.href = "/";
                return;
            }

            const response = await fetch(
                `/api/tiles/${tile.id}`,
                {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer ${token}`
                    }
                }
            );

            const data = await response.json();

            alert(data.message);

            loadTiles();
        };

        board.appendChild(div);

    });

}

loadTiles();
</script>

</body>
</html>
