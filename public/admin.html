<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel Administratora</title>

<style>
body{
    font-family:Arial;
    max-width:900px;
    margin:20px auto;
}

.row{
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
}

button{
    cursor:pointer;
}

.message{
    margin:10px 0 15px 0;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>Panel Administratora</h1>

<p id="message" class="message"></p>
<div id="tiles"></div>

<script>
function getToken(){
    return localStorage.getItem("token");
}

function showMessage(message){
    document.getElementById("message").innerText = message || "";
}

function escapeText(value){
    return String(value ?? "");
}

async function loadTiles(){
    const token = getToken();

    if(!token){
        showMessage("Brak tokenu. Zaloguj się ponownie.");
        window.location.href = "/";
        return;
    }

    try{
        const response = await fetch(`/api/tiles/taken/list?_=${Date.now()}`, {
            cache:"no-store",
            headers:{
                Authorization:`Bearer ${token}`
            }
        });

        const data = await response.json();

        if(!response.ok){
            showMessage(data.message || "Brak dostępu do panelu administratora.");
            return;
        }

        const container = document.getElementById("tiles");
        container.innerHTML = "";

        if(!Array.isArray(data) || data.length === 0){
            showMessage("Brak zajętych kafelków.");
            return;
        }

        showMessage("");

        data.forEach(tile => {
            const div = document.createElement("div");
            div.className = "row";

            const info = document.createElement("div");
            info.innerText = `Kafelek #${escapeText(tile.id)} — ${escapeText(tile.nickname)}`;

            const button = document.createElement("button");
            button.innerText = "Odblokuj";
            button.onclick = () => unlockTile(tile.id);

            div.appendChild(info);
            div.appendChild(button);

            container.appendChild(div);
        });

    }catch(error){
        showMessage("Nie można połączyć się z serwerem.");
    }
}

async function unlockTile(id){
    const token = getToken();

    if(!token){
        showMessage("Brak tokenu. Zaloguj się ponownie.");
        window.location.href = "/";
        return;
    }

    const confirmed = confirm(`Czy na pewno chcesz odblokować kafelek #${id}?`);

    if(!confirmed){
        return;
    }

    try{
        const response = await fetch(`/api/tiles/unlock/${id}`, {
            method:"POST",
            headers:{
                Authorization:`Bearer ${token}`
            }
        });

        const data = await response.json();

        if(!response.ok){
            showMessage(data.message || "Nie udało się odblokować kafelka.");
            return;
        }

        showMessage(data.message || "Kafelek odblokowany.");
        await loadTiles();

    }catch(error){
        showMessage("Nie można połączyć się z serwerem.");
    }
}

loadTiles();
</script>

</body>
</html>
