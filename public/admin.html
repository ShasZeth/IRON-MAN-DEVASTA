<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel Administratora</title>

<style>

body{
    font-family:Arial;
    max-width:900px;
    margin:20px auto;
}

.row{
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    cursor:pointer;
}

</style>

</head>
<body>

<h1>Panel Administratora</h1>

<div id="tiles"></div>

<script>

async function loadTiles(){

    const token =
        localStorage.getItem("token");

    const response =
        await fetch("/api/tiles/taken/list", {
            headers:{
                Authorization:
                    `Bearer ${token}`
            }
        });

    const data =
        await response.json();

    const container =
        document.getElementById("tiles");

    container.innerHTML = "";

    data.forEach(tile => {

        const div =
            document.createElement("div");

        div.className = "row";

        div.innerHTML = `
            <div>
                Kafelek #${tile.id}
                — ${tile.nickname}
            </div>

            <button
                onclick="unlockTile(${tile.id})">
                Odblokuj
            </button>
        `;

        container.appendChild(div);

    });

}

async function unlockTile(id){

    const token =
        localStorage.getItem("token");

    const response =
        await fetch(
            `/api/tiles/unlock/${id}`,
            {
                method:"POST",
                headers:{
                    Authorization:
                        `Bearer ${token}`
                }
            }
        );

    const data =
        await response.json();

    alert(data.message);

    loadTiles();
}

loadTiles();

</script>

</body>
</html>
