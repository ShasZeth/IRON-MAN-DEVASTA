<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>IRON MAN DEVASTA</title>

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    color:white;

    background:
        linear-gradient(rgba(0,0,0,.20), rgba(0,0,0,.68)),
        url("/img/login-bg.png");

    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:80px;
}

.auth-frame{
    position:relative;
    width:550px;
    height:370px;

    background-size:100% 100%;
    background-repeat:no-repeat;
    background-position:center;

    filter:drop-shadow(0 0 14px rgba(255,80,0,.35));
}

.register-frame{
    background-image:url("/img/rejestracja-bgrl.png");
}

.login-frame{
    background-image:url("/img/logowanie-bgrl.png");
}

.auth-frame input{
    position:absolute;

    left:190px;
    width:208px;
    height:26px;
    padding:0 8px;

    border:none;
    outline:none;

    background:rgba(0,0,0,.18);
    box-shadow:
        inset 0 0 8px rgba(0,0,0,.9),
        0 0 8px rgba(255,180,0,.20);

    color:#ffd700;
    font-weight:bold;
    font-size:12px;
    box-sizing:border-box;
}

.auth-frame input:focus{
    background:rgba(0,0,0,.28);
    box-shadow:
        inset 0 0 8px rgba(0,0,0,.95),
        0 0 10px rgba(255,215,0,.55),
        0 0 18px rgba(255,80,0,.35);
}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active{
    -webkit-box-shadow:0 0 0 1000px rgba(0,0,0,.35) inset !important;
    -webkit-text-fill-color:#ffd700 !important;
    caret-color:#ffd700;
    transition:background-color 9999s ease-in-out 0s;
}

.auth-frame input::placeholder{
    color:transparent;
}

.nickname-input{
    top:166px;
}

.password-input{
    top:205px;
}

.frame-btn{
    position:absolute;

    left:190px;
    top:244px;

    width:169px;
    height:35px;

    border:none;
    background:rgba(255,0,0,.03);

    color:transparent;
    cursor:pointer;
    box-sizing:border-box;
}

.frame-btn:hover{
    background:rgba(255,50,0,.12);
    box-shadow:
        0 0 12px rgba(255,0,0,.45),
        0 0 20px rgba(255,180,0,.25);
}

.frame-btn:active{
    background:rgba(255,215,0,.12);
    box-shadow:
        0 0 16px rgba(255,215,0,.55),
        0 0 24px rgba(255,0,0,.35);
}

.message{
    position:absolute;
    left:40px;
    right:40px;
    bottom:-18px;

    text-align:center;
    color:#ffd700;
    font-size:12px;
    font-weight:bold;
    text-shadow:
        0 0 8px black,
        0 0 8px rgba(255,120,0,.75);
    min-height:16px;
}

@media(max-width:1100px){
    body{
        overflow:auto;
        align-items:flex-start;
    }

    .container{
        flex-direction:column;
        gap:22px;
        padding:20px;
        transform:none;
        margin-top:180px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="auth-frame register-frame">
        <input
            id="registerNickname"
            class="nickname-input"
            placeholder="Nickname"
        >

        <input
            id="registerPassword"
            class="password-input"
            type="password"
            placeholder="Hasło"
        >

        <button
            class="frame-btn"
            onclick="register()">
            Zarejestruj się
        </button>

        <p id="registerResult" class="message"></p>
    </div>

    <div class="auth-frame login-frame">
        <input
            id="loginNickname"
            class="nickname-input"
            placeholder="Nickname"
        >

        <input
            id="loginPassword"
            class="password-input"
            type="password"
            placeholder="Hasło"
        >

        <button
            class="frame-btn"
            onclick="login()">
            Zaloguj się
        </button>

        <p id="loginResult" class="message"></p>
    </div>

</div>

<script>
async function register(){

    const nickname =
        document.getElementById("registerNickname").value;

    const password =
        document.getElementById("registerPassword").value;

    const response = await fetch("/api/register", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            nickname,
            password
        })
    });

    const data = await response.json();

    document.getElementById("registerResult").innerText =
        data.message || "Konto utworzone! Możesz się zalogować.";
}

async function login(){

    const nickname =
        document.getElementById("loginNickname").value;

    const password =
        document.getElementById("loginPassword").value;

    const response = await fetch("/api/login", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            nickname,
            password
        })
    });

    const data = await response.json();

    if(data.success){
        localStorage.setItem("token", data.token);

        if(data.rulesAccepted){
            window.location.href = "/board.html";
        }else{
            window.location.href = "/rules.html";
        }
    }else{
        document.getElementById("loginResult").innerText =
            data.message;
    }
}
</script>

</body>
</html>
