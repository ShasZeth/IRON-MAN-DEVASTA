<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>IRON MAN DEVASTA</title>

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    color:white;

    background:
        linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.68)),
        url("/img/login-bg.png");

    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.container{
    display:flex;
    gap:250px;
    justify-content:center;
    align-items:flex-start;
    margin-top:14px;
}

.panel{
    width:360px;
    background:rgba(12,12,12,.84);
    color:white;
    padding:28px;
    border-radius:14px;
    border:1px solid rgba(255,215,0,.45);
    box-shadow:
        0 0 25px rgba(0,0,0,.9),
        0 0 25px rgba(255,120,0,.18);
    backdrop-filter:blur(4px);
}

h1{
    text-align:center;
    color:#ffd700;
    text-shadow:0 0 10px rgba(255,180,0,.55);
    margin-top:0;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
    border:1px solid #b8860b;
    border-radius:6px;
    background:#111;
    color:#ffd700;
}

input::placeholder{
    color:#cfcfcf;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.register-btn{
    background:linear-gradient(145deg,#8b0000,#d01818);
    color:white;
}

.login-btn{
    background:linear-gradient(145deg,#b8860b,#ffd700);
    color:#111;
}

.message{
    text-align:center;
    margin-top:10px;
    min-height:20px;
}

@media(max-width:900px){
    .container{
        flex-direction:column;
        gap:25px;
        margin-top:260px;
        padding:20px;
    }

    .panel{
        width:calc(100vw - 80px);
        max-width:360px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="panel">
        <h1>Rejestracja</h1>

        <input id="registerNickname" placeholder="Nickname">
        <input id="registerPassword" type="password" placeholder="Hasło">

        <button class="register-btn" onclick="register()">
            Utwórz konto
        </button>

        <p id="registerResult" class="message"></p>
    </div>

    <div class="panel">
        <h1>Logowanie</h1>

        <input id="loginNickname" placeholder="Nickname">
        <input id="loginPassword" type="password" placeholder="Hasło">

        <button class="login-btn" onclick="login()">
            Zaloguj
        </button>

        <p id="loginResult" class="message"></p>
    </div>

</div>

<script>
async function register(){

    const nickname =
        document.getElementById("registerNickname").value;

    const password =
        document.getElementById("registerPassword").value;

    const response = await fetch("/api/register", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            nickname,
            password
        })
    });

    const data = await response.json();

    document.getElementById("registerResult").innerText =
        data.message || "Konto utworzone! Możesz się zalogować.";
}

async function login(){

    const nickname =
        document.getElementById("loginNickname").value;

    const password =
        document.getElementById("loginPassword").value;

    const response = await fetch("/api/login", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            nickname,
            password
        })
    });

    const data = await response.json();

    if(data.success){
        localStorage.setItem("token", data.token);
        window.location.href = "/board.html";
    }else{
        document.getElementById("loginResult").innerText =
            data.message;
    }
}
</script>
